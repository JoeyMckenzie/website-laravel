pre-push:
  parallel: true
  jobs:
    - name: npm packages audit
      tags:
        - frontend
        - security
      run: npm audit

    - name: php packages audit
      tags:
        - backend
        - security
      run: composer audit

pre-commit:
  parallel: true
  jobs:
    - name: format frontend files
      run: npm run fmt
      glob: "*.{js,ts,jsx,tsx,json,md}"

    - name: format backend files
      run: composer fmt
      glob: "*.php"

    - name: refactor backend files
      run: composer refactor
      glob: "*.php"
